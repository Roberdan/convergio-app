plan:
  name: "Convergio Post-Review Hardening"
  project: convergio
  description: |
    Piano completo post-review da 3 modelli indipendenti (Opus 4.6, GPT 5.4, Goldeneye).
    46 finding validati, 75 azioni. Ordine: ADR/baseline → fix broken → security → reliability → test → prevention → observability → cleanup.
    Ogni cambio architetturale ha un ADR PRIMA. Ogni fix ha un baseline PRIMA e un test DOPO.
  priority: critical

waves:

  # ═══════════════════════════════════════════════════════════
  # W0: FONDAMENTA — ADR + Baselines (misura PRIMA di fixare)
  # ═══════════════════════════════════════════════════════════
  - id: W0
    name: "ADR + Baselines"
    description: "Documenta decisioni architetturali e misura stato attuale PRIMA di qualsiasi fix"
    parallel: true
    tasks:
      - id: T0-01
        do: |
          Scrivere ADR-022: Nuovo modello di autenticazione.
          Context: 4 bypass path trovati (Host header, dev-mode default, JWT secret vuoto, SSE exempt).
          Decision: rimuovere Host-header bypass, JWT mandatory con secret persistente, dev-mode opt-in, bind 127.0.0.1 senza token.
          Consequences: breaking change per chi usa localhost bypass. Enforcement: CI test che tenta bypass.
          Formato: docs/adr/ADR-022-auth-model-hardening.md, max 30 righe, con sezione Enforcement.
        type: planning
        output_type: document
        model: claude-opus-4.6
        executor_agent: claude
        validator_agent: doc-validator
        effort: 1
        verify:
          - "test -f docs/adr/ADR-022-auth-model-hardening.md"
          - "grep -q 'Status: Accepted' docs/adr/ADR-022-auth-model-hardening.md"
          - "grep -q 'Enforcement' docs/adr/ADR-022-auth-model-hardening.md"

      - id: T0-02
        do: |
          Scrivere ADR-023: Fail Closed by Default.
          Context: migration failure non blocca boot, config error torna ai default, inference finge successo.
          Decision: extension dichiarano mandatory/optional. Mandatory: migration fail = abort. Config error = fail fast in prod.
          Definire lista extension mandatory vs optional. Formato: docs/adr/ADR-023-fail-closed-default.md.
        type: planning
        output_type: document
        model: claude-opus-4.6
        executor_agent: claude
        validator_agent: doc-validator
        effort: 1
        verify:
          - "test -f docs/adr/ADR-023-fail-closed-default.md"
          - "grep -q 'mandatory' docs/adr/ADR-023-fail-closed-default.md"

      - id: T0-03
        do: |
          Scrivere ADR-024: Consolidamento crate operativi.
          Context: deploy+build+provisioning+file-transport = 4 crate per un workflow. delegation+longrunning overlap con agent-runtime.
          Decision: merge deploy/build/provisioning → convergio-ops. Fold longrunning checkpoint/heartbeat in agent-runtime. Keep delegation per remote transport.
          Trade-off: compilazione incrementale persa vs manutenibilità.
          Status: DEFERRED — decisione documentata, implementazione fuori scope di questo piano (troppo rischiosa da combinare con hardening). Implementare in un piano dedicato.
          Formato: docs/adr/ADR-024-crate-consolidation.md.
        type: planning
        output_type: document
        model: claude-opus-4.6
        executor_agent: claude
        validator_agent: doc-validator
        effort: 1
        verify:
          - "test -f docs/adr/ADR-024-crate-consolidation.md"
          - "grep -q 'Status: Deferred' docs/adr/ADR-024-crate-consolidation.md"

      - id: T0-04
        do: |
          Scrivere ADR-025: SQLite Boundaries (supersedes ADR-003).
          Context: ADR-003 accettava SQLite senza boundary. Ora: 72+ tabelle, 27 extension, background tasks, cron.
          Decision: conferma SQLite per single-node. Documenta limiti: max 8 conn, WAL checkpoint solo shutdown.
          Trigger per migrazione: >100 write/sec sustained, >10 concurrent agents, multi-node deployment.
          Read-only pool separato come enhancement futuro.
          Formato: docs/adr/ADR-025-sqlite-boundaries.md.
        type: planning
        output_type: document
        model: claude-opus-4.6
        executor_agent: claude
        validator_agent: doc-validator
        effort: 1
        verify:
          - "test -f docs/adr/ADR-025-sqlite-boundaries.md"
          - "grep -q 'Supersedes.*ADR-003' docs/adr/ADR-025-sqlite-boundaries.md"

      - id: T0-05
        do: |
          Creare security baseline measurement script (NON test module).
          File: daemon/scripts/security-baseline.sh
          Script bash che MISURA lo stato attuale (non parte della test suite):
          1. Tentare curl con Host: localhost:8420 header → registra se ritorna 200 o 401
          2. Verificare se JWT con secret vuoto viene accettato
          3. Verificare se SSE stream /api/events/stream è accessibile senza auth
          4. Contare endpoint che ritornano 200 con body {"error": ...}
          Output in JSON su stdout: security_baseline_results.json format.
          Questo script viene rieseguito in WC1 per confronto DOPO le fix.
          NON è un test module — NON tocca cargo test.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        verify:
          - "test -f daemon/scripts/security-baseline.sh"
          - "test -x daemon/scripts/security-baseline.sh"
          - "grep -q 'Host.*localhost' daemon/scripts/security-baseline.sh"
          - "cargo check --workspace"

      - id: T0-06
        do: |
          Creare error handling baseline metric.
          Script daemon/scripts/error-baseline.sh che conta:
          - unwrap() in non-test .rs files (baseline: ~1140)
          - unwrap_or_default() in non-test .rs files (baseline: ~152)
          - Pattern "Json(json!({\"error\":" con status 200 (da contare)
          - File > 250 righe in daemon/crates (baseline: ~13)
          Output in formato JSON con chiavi: unwrap_count, unwrap_default_count, error_200_count, oversized_file_count.
          Questo script diventerà CI gate in W5.
        type: code
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        verify:
          - "test -f daemon/scripts/error-baseline.sh"
          - "bash daemon/scripts/error-baseline.sh | python3 -m json.tool"

      - id: T0-07
        do: |
          Scrivere ADR-026: API Versioning Strategy.
          Context: 208+ endpoint senza versioning. Breaking changes inevitabili.
          Decision: nessun versioning esplicito per v1.x — solo backward-compatible additions.
          Breaking changes: aggiungere /api/v2/ prefix, mantenere v1 per 2 release.
          Formato: docs/adr/ADR-026-api-versioning.md, max 20 righe.
        type: planning
        output_type: document
        model: claude-opus-4.6
        executor_agent: claude
        validator_agent: doc-validator
        effort: 1
        verify:
          - "test -f docs/adr/ADR-026-api-versioning.md"
          - "grep -q 'Status: Accepted' docs/adr/ADR-026-api-versioning.md"

      - id: T0-08
        do: |
          Performance baseline con criterion sui hot path.
          Aggiungere criterion benchmark in daemon/benches/baseline.rs.
          Benchmark: Plan CRUD, Health deep, Pool acquire/release under 8 concurrent, Migration run time.
          Aggiungere criterion = "0.5" a [dev-dependencies]. Solo per run manuali, non CI.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check --workspace"
          - "test -f daemon/benches/baseline.rs"

  # ═══════════════════════════════════════════════════════════
  # W1: COSE ROTTE — non compilano / non funzionano
  # ═══════════════════════════════════════════════════════════
  - id: W1
    name: "Fix Broken"
    description: "Codice che non compila o funzionalità che non funzionano"
    parallel: true
    tasks:
      - id: T1-01
        do: |
          Fix compilazione Tauri app (convergio-app/src-tauri/).
          6 errori: convergio_types e dirs mancano da Cargo.toml, tauri::Emitter non importato.
          1. Aggiungere a Cargo.toml: convergio-types = { path = "../../daemon/crates/convergio-types" }, dirs = "6"
          2. In daemon.rs: aggiungere use tauri::Emitter; dopo le import
          3. In tray.rs: aggiungere use tauri::Emitter; dopo le import
          4. In daemon.rs:87: aggiungere type annotation |p: &std::path::PathBuf|
          5. Verificare: cargo check nel dir convergio-app/src-tauri
          6. Fix license in Cargo.toml: "MIT" → file = "../../LICENSE"
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        verify:
          - "cd convergio-app/src-tauri && cargo check"
          - "grep -q 'convergio-types' convergio-app/src-tauri/Cargo.toml"
          - "grep -q 'Emitter' convergio-app/src-tauri/src/daemon.rs"

      - id: T1-02
        do: |
          Creare /api/shutdown endpoint nel daemon oppure rimuovere la chiamata dal Tauri app.
          Opzione raccomandata: creare route POST /api/shutdown in convergio-server che:
          1. Richiede auth (non dev-mode bypass)
          2. Invia SIGTERM al processo corrente via tokio::signal
          3. Logga l'evento di shutdown
          Aggiungere la route in server/router.rs o in un modulo lifecycle.
          Alternativa: se troppo complesso, rimuovere il POST /api/shutdown da daemon.rs:57-60
          e far usare solo il fallback platform_restart::stop_daemon().
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check --workspace"
          - "grep -rq 'shutdown' daemon/crates/convergio-server/src/ || grep -vq '/api/shutdown' convergio-app/src-tauri/src/daemon.rs"

      - id: T1-03
        do: |
          Eseguire fix CLI-API alignment da specs/fix-cli-api-alignment.yaml.
          Il file spec contiene 12+ task con fix specifiche:
          - cli_bus.rs: campo 'message' → 'content'
          - cli_launch.rs: campo 'agent_id' → 'name', POST unregister → DELETE
          - cli_ask.rs: path /api/ipc/agents/list → /api/ipc/agents
          Applicare TUTTE le fix elencate nel file YAML.
          Verificare con: cargo test -p convergio-cli --test api_contract_test
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check -p convergio-cli"
          - "cargo test -p convergio-cli"

  # ═══════════════════════════════════════════════════════════
  # W2: SECURITY HARDENING — i 12 fix più critici
  # ═══════════════════════════════════════════════════════════
  - id: W2
    name: "Security Hardening"
    description: "Fix auth bypass, SSRF, injection, path traversal — come da ADR-022"
    parallel: false
    tasks:
      - id: T2-01
        do: |
          Fix auth middleware come da ADR-022.
          File: daemon/crates/convergio-server/src/middleware_auth.rs e runner.rs.
          1. In runner.rs: cambiare router.into_make_service() → router.into_make_service_with_connect_info::<std::net::SocketAddr>()
          2. In middleware_auth.rs: RIMUOVERE il fallback su Host header (linee 52-56). Usare SOLO ConnectInfo<SocketAddr>.
          3. Rendere dev-mode opt-in: richiedere env var CONVERGIO_DEV_MODE=true esplicita. Se assente E no auth token → refuse to start (o bind solo 127.0.0.1).
          4. In main.rs: cambiare la logica dev_mode (linee 211-215) per richiedere CONVERGIO_DEV_MODE=true.
          5. Aggiornare i test E2E per riflettere il nuovo comportamento.
        type: code
        output_type: pr
        model: claude-sonnet-4.6
        executor_agent: claude
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -q 'Host.*localhost' daemon/crates/convergio-server/src/middleware_auth.rs"
          - "grep -q 'into_make_service_with_connect_info' daemon/crates/convergio-server/src/runner.rs"
          - "grep -q 'CONVERGIO_DEV_MODE' daemon/src/main.rs"

      - id: T2-02
        do: |
          Fix JWT secret initialization.
          File: daemon/crates/convergio-security/src/jwt.rs e daemon/src/main.rs.
          1. In main.rs: chiamare convergio_security::jwt::init_jwt_secret() PRIMA di build_router.
          2. In jwt.rs: rimuovere il fallback a b"" in get_secret(). Se OnceLock è vuoto, panic con messaggio chiaro.
          3. In jwt.rs: se env CONVERGIO_JWT_SECRET è assente E non è dev-mode → generare secret random E scriverlo su file persistente (~/.convergio/jwt_secret). Al prossimo avvio leggerlo da file.
          4. Aggiungere test che verifica: init → get_secret() != b"".
        type: code
        output_type: pr
        model: claude-sonnet-4.6
        executor_agent: claude
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "grep -q 'init_jwt_secret' daemon/src/main.rs"
          - "! grep -q 'b\"\"' daemon/crates/convergio-security/src/jwt.rs"

      - id: T2-03
        do: |
          Fix HTTP bridge SSRF + path traversal artifacts + SSE auth.
          Tre fix di sicurezza raggruppate perché piccole:
          1. HTTP bridge (crates/convergio-http-bridge/src/proxy.rs): NON forwardare header Authorization, Cookie, X-Api-Key a URL esterni. Whitelist di header safe da forwardare. Validare base_url: solo http/https, no localhost/127.0.0.1/private ranges.
          2. Artifact upload (crates/convergio-orchestrator/src/artifact_routes.rs): sanitizzare filename — strip componenti path, reject se contiene ".." o è assoluto. Usare UUID come nome file interno.
          3. SSE auth (crates/convergio-server/src/middleware_auth.rs): rimuovere /api/events/ dalla lista exempt. Aggiungere auth a SSE.
        type: code
        output_type: pr
        model: claude-sonnet-4.6
        executor_agent: claude
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -q 'Authorization' daemon/crates/convergio-http-bridge/src/proxy.rs || grep -q 'skip.*Authorization' daemon/crates/convergio-http-bridge/src/proxy.rs"
          - "! grep -q '/api/events' daemon/crates/convergio-server/src/middleware_auth.rs || grep -q 'auth.*events' daemon/crates/convergio-server/src/middleware_auth.rs"

      - id: T2-04
        do: |
          Fix SQL injection mesh + HMAC verify inbound + backup/spawn hardening.
          Quattro fix raggruppate:
          1. SQL injection (crates/convergio-mesh/src/sync_apply.rs): in apply_changes(), validare table names con la stessa regex usata in export_changes_since(). Reject se non alphanumeric+underscore.
          2. HMAC verify (crates/convergio-mesh/src/routes.rs): aggiungere chiamata verify_hmac() su TUTTE le route mesh inbound che modificano dati (sync import, peer register).
          3. Backup import (crates/convergio-backup/src/routes.rs): whitelist di directory ammesse per import path. Reject path assoluti fuori da data dir.
          4. Agent spawn (crates/convergio-agent-runtime/src/spawner.rs): rimuovere --dangerously-skip-permissions. Validare agent_name: solo alphanum+dash, max 64 char. Rimuovere repo_override dall'API pubblica.
        type: code
        output_type: pr
        model: claude-sonnet-4.6
        executor_agent: claude
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "grep -q 'verify_hmac' daemon/crates/convergio-mesh/src/routes.rs"
          - "! grep -q 'dangerously-skip-permissions' daemon/crates/convergio-agent-runtime/src/spawner.rs"

      - id: T2-05
        do: |
          Fix process scanner + secret isolation + rate limiter.
          Tre fix finali di sicurezza:
          1. Process scanner (crates/convergio-ipc/src/process_scanner.rs): filtrare output ps aux — rimuovere argomenti dopo il nome del binario, O non salvare command line nel DB, solo process name e PID.
          2. Secret isolation (crates/convergio-multitenancy/src/secret_isolation.rs): usare encryption reale con AEAD (AES-256-GCM o ChaCha20Poly1305). Derivare key da CONVERGIO_JWT_SECRET + org_id. Migrare store_secret/get_secret.
          3. Rate limiter (crates/convergio-server/src/router.rs): estrarre client IP da ConnectInfo (ora che T2-01 l'ha wired). Sostituire "unknown".to_string() con IP reale.
        type: code
        output_type: pr
        model: claude-sonnet-4.6
        executor_agent: claude
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -q '\"unknown\"' daemon/crates/convergio-server/src/router.rs"
          - "grep -q 'Aes256Gcm\\|ChaCha20Poly1305\\|aead' daemon/crates/convergio-multitenancy/src/secret_isolation.rs"
          - "cargo test -p convergio-multitenancy"
          - "! grep -rq 'cmdline\\|command_line.*args' daemon/crates/convergio-ipc/src/process_scanner.rs || grep -q 'filter\\|strip\\|sanitize' daemon/crates/convergio-ipc/src/process_scanner.rs"

  # ═══════════════════════════════════════════════════════════
  # WC1: CHECKPOINT — commit, verify security baseline
  # ═══════════════════════════════════════════════════════════
  - id: WC1
    name: "Checkpoint 1 — Security Complete"
    description: "Commit, push, verify security baseline passes, budget check"
    parallel: false
    tasks:
      - id: TC1-01
        do: |
          Checkpoint dopo W0-W2.
          1. cargo check --workspace && cargo test --workspace && cargo fmt --all
          2. Rieseguire security baseline test (daemon/tests/e2e/security_baseline.rs) — ora i test di bypass DEVONO FALLIRE (= security fix funzionano).
          3. Rieseguire error-baseline.sh — confrontare con baseline iniziale.
          4. Commit + push tutti i branch aperti.
          5. Aggiornare plan.md con stato attuale.
          6. Se shell budget è sotto soglia, suggerire nuova sessione.
        type: code
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"

  # ═══════════════════════════════════════════════════════════
  # W3: RELIABILITY — error handling, supervisor, fail-closed
  # ═══════════════════════════════════════════════════════════
  - id: W3
    name: "Reliability Core"
    description: "Error handling standardization, background task supervisor, fail-closed boot"
    parallel: true
    tasks:
      - id: T3-01a
        do: |
          Standardizzare error handling (tranche 1): ipc, mesh, orchestrator, backup.
          Per ogni crate:
          1. Cambiare return type handler da impl IntoResponse a Result<Json<...>, ApiError>
          2. Convertire match pool.get() → pool.get().map_err(|e| ApiError::internal(e))?
          3. Rimuovere pattern: Json(json!({"error": e.to_string()})) con status 200
          Usare ApiError già definito in convergio-server/src/state.rs.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -rn 'Json(json!.*error' daemon/crates/convergio-ipc/src/routes.rs daemon/crates/convergio-mesh/src/routes.rs daemon/crates/convergio-orchestrator/src/plan_routes.rs daemon/crates/convergio-backup/src/routes.rs | grep -v test | grep -v '//'"

      - id: T3-01b
        do: |
          Standardizzare error handling (tranche 2): build, cockpit, billing, observatory, deploy, delegation.
          Stessa procedura di T3-01a: Result<_, ApiError>, rimuovere 200+{error} JSON.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -rn 'Json(json!.*error' daemon/crates/convergio-build/src/routes.rs daemon/crates/convergio-cockpit/src/routes.rs daemon/crates/convergio-billing/src/routes.rs daemon/crates/convergio-observatory/src/routes.rs daemon/crates/convergio-deploy/src/routes.rs daemon/crates/convergio-delegation/src/ | grep -v test | grep -v '//'"
          - "bash daemon/scripts/error-baseline.sh | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d.get('error_200_count',0) == 0, f'Still {d.get(chr(101)+chr(114)+chr(114)+chr(111)+chr(114)+chr(95)+chr(50)+chr(48)+chr(48)+chr(95)+chr(99)+chr(111)+chr(117)+chr(110)+chr(116))} patterns'\""

      - id: T3-02
        do: |
          Creare TaskSupervisor per i 27 tokio::spawn.
          File: daemon/crates/convergio-server/src/task_supervisor.rs (nuovo)
          1. Struct TaskSupervisor con HashMap<String, JoinHandle<()>>
          2. Metodo spawn_supervised(name, future) che: salva JoinHandle, se task panica → restart con backoff (max 3 retry)
          3. Metodo health() → Vec<TaskHealth> con: name, status (running/dead/restarting), restart_count, last_error
          4. Registrare il supervisor nel HealthRegistry come health check
          5. Refactoring: sostituire i principali tokio::spawn in: cron_executor, sync_loop, spawn_monitor, reaper, process_scanner, observatory/sink con supervisor.spawn_supervised()
          NON serve fare tutti e 27 in questo task — fare i 6 più critici, documentare il pattern per i restanti.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "test -f daemon/crates/convergio-server/src/task_supervisor.rs"
          - "grep -q 'spawn_supervised' daemon/crates/convergio-server/src/task_supervisor.rs"

      - id: T3-03
        do: |
          Fail-closed boot + blocking HTTP fix + panics removal.
          Come da ADR-023:
          1. main.rs migration loop: se migration fallisce per extension nella lista mandatory (db, ipc, orchestrator, security, server) → panic/abort.
             Per extension optional: log warning, NON registrare le routes.
          2. main.rs on_start loop: stessa logica — mandatory fail = abort, optional fail = skip routes.
          3. Config: crates/convergio-server/src/config.rs — se file config esiste ma parsing fallisce → abort con errore chiaro (non fall back a defaults silenziosamente). Se file non esiste → ok, usa defaults ma logga warning.
          4. Fix reqwest::blocking: in org/provisioner.rs, kernel/monitor.rs, mcp/http.rs — wrap chiamate blocking in tokio::task::spawn_blocking().
          5. Rimuovere panic! da scheduler/routes.rs:190 e evidence_routes.rs:93 — sostituire con ? operator.
        type: code
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        verify:
          - "cargo check --workspace"
          - "cargo test --workspace"
          - "! grep -q 'unwrap_or_else.*panic' daemon/crates/convergio-scheduler/src/routes.rs"
          - "grep -q 'spawn_blocking' daemon/crates/convergio-org/src/provisioner.rs"

      - id: T3-04
        do: |
          Misc reliability: self-build mutex, restore offline, inference honest, Tauri quit.
          1. Self-build (crates/convergio-build/src/routes.rs): aggiungere static AtomicBool come lock. Se build in corso → return 409 Conflict.
