# ──────────────────────────────────────────────────────────────
# Stress Test (ADR-039)
# ──────────────────────────────────────────────────────────────
stress_test:
  most_likely_to_fail: >
    T3-03 (Security config) — daemon may not have dedicated security config
    endpoints. The task includes a fallback (read-only with CLI note) but
    this needs verification against the running daemon first.
  single_point_of_failure: >
    T1-01 (API client expansion) — all subsequent waves depend on these
    API functions. If types are wrong or endpoints don't match daemon,
    everything downstream breaks.
  if_could_remove_one: >
    T3-03 (Security config) — lowest user value, most uncertain API surface.
    Security config via CLI is acceptable for now.
  wave_dependency_cascade: >
    W1 → W2/W3/W4 — if W1 is delayed, three waves are blocked.
    Mitigation: W1 is a single task, should complete fast.
    Also W5/W6 depend on WC1 checkpoint which depends on W2/W3/W4.
  integration_gap: >
    Delegation page (T5-02) adds a new route but doesn't update i18n
    files for all 4 languages. Task mentions "create i18n namespace if needed"
    but should explicitly list the translation keys needed.
    Also: sidebar navigation order may need design review.
