# Convergio UI — Full Mission Control Redesign
# Scale: full | 38 F-xx | ~45 tasks | 14 waves + 3 checkpoints + closure
# Project: convergio-app (inside convergio/ repo)
# Framework: convergio-frontend (Maranello DS, Next.js 16, Tauri)
# Devil's Advocate: resolved (7 findings)
# Models consulted: GPT 5.4 (architecture), Goldeneye (UX design)

plan:
  name: "Convergio UI — Full Mission Control"
  project_id: convergio
  description: >
    Complete frontend redesign as AI Operations Command Center.
    25+ pages covering all 200+ daemon API endpoints and 81 capabilities.
    Multi-daemon aware, Tauri desktop + web, 4 themes, 4 languages,
    WebSocket + SSE real-time, WCAG 2.2 AA accessible.

waves:
  # ═══════════════════════════════════════════════════════════
  # W0 — Foundation: project setup, i18n, test infra, Tauri
  # Covers: F-01, F-26, F-28, F-34, F-38
  # ═══════════════════════════════════════════════════════════
  - id: W0
    name: "Foundation — Project Setup & Infrastructure"
    tasks:
      - id: T0-01
        do: >
          Clone convergio-frontend framework into convergio-app/ (delete existing content first).
          Configure convergio.yaml with full Convergio navigation (7 sections: Mission Control, Work,
          Agents, Organizations, Fleet, Intelligence, Governance, Admin). Configure api.baseUrl to
          http://localhost:8420. Set up pnpm, verify pnpm dev starts, verify pnpm build succeeds.
          Configure next.config.ts for API proxy to daemon. Set NEXT_PUBLIC_API_URL.
          All 14 existing dashboard pages must render (even if empty placeholders initially wired).
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "pnpm build succeeds, pnpm dev serves at localhost:3000, convergio.yaml has 7 nav sections"
        verify:
          - "cd convergio-app && test -f convergio.yaml"
          - "cd convergio-app && test -f package.json"
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && grep -q 'Mission Control' convergio.yaml"

      - id: T0-02
        do: >
          Set up full i18n infrastructure for 4 languages: English (en), Italian (it),
          Spanish (es), Chinese (zh). Use the framework's useLocale() / resolveLocale() system.
          Create 4 complete locale files covering ALL navigation labels, page titles,
          button labels, error messages, tooltips, placeholders, aria-labels, and system messages.
          Every user-facing string in convergio.yaml navigation must be localized.
          Add language switcher to the header (dropdown with flag icons).
          Default locale detection from browser. Persist in localStorage.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "4 locale files exist with 100+ keys each, language switcher renders, switching locale updates all nav labels"
        verify:
          - "cd convergio-app && test -f src/lib/i18n/locales/en.json"
          - "cd convergio-app && test -f src/lib/i18n/locales/it.json"
          - "cd convergio-app && test -f src/lib/i18n/locales/es.json"
          - "cd convergio-app && test -f src/lib/i18n/locales/zh.json"
          - "cd convergio-app && pnpm typecheck"

      - id: T0-03
        do: >
          Set up Playwright E2E test infrastructure + visual regression testing.
          Configure playwright.config.ts for 3 browsers (Chrome, Firefox, WebKit).
          Add visual regression with @playwright/test toHaveScreenshot().
          Create test helpers: login flow, API mock, theme switcher, locale switcher.
          Write first smoke test: app loads, sidebar renders, theme switching works, locale switching works.
          Configure CI-ready scripts in package.json. Test in Navy and Dark themes.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "Playwright runs, smoke test passes in Navy+Dark themes, visual regression captures baseline screenshots"
        verify:
          - "cd convergio-app && test -f playwright.config.ts"
          - "cd convergio-app && test -f e2e/smoke.spec.ts"
          - "cd convergio-app && pnpm test:e2e --reporter=list 2>&1 | grep -q 'passed'"

      - id: T0-04
        do: >
          Configure Tauri 2.0 desktop shell in src-tauri/. Update tauri.conf.json:
          productName "Convergio", identifier "io.convergio.cockpit", window 1440x900.
          Set up system tray plugin (tauri-plugin-tray). Create tray icon assets
          (template icons for macOS menu bar: green/yellow/red variants, 22x22 @1x and @2x).
          Implement basic system tray with: app name, "Open Dashboard" action, "Quit" action.
          Verify cargo tauri build compiles. The tray functionality (health polling, nodes)
          comes in W11; this task sets up the Tauri + tray plugin foundation.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "Tauri config valid, system tray plugin configured, cargo tauri build succeeds"
        verify:
          - "cd convergio-app && test -f src-tauri/tauri.conf.json"
          - "cd convergio-app && grep -q 'Convergio' src-tauri/tauri.conf.json"
          - "cd convergio-app && test -f src-tauri/icons/icon.icns"

  # ═══════════════════════════════════════════════════════════
  # W1 — Daemon WebSocket Layer (Rust, in main convergio repo)
  # Covers: F-23
  # ═══════════════════════════════════════════════════════════
  - id: W1
    name: "Daemon WebSocket Layer"
    tasks:
      - id: T1-01
        do: >
          Add WebSocket support to convergio-ipc crate. Implement axum WebSocket upgrade handler
          at /api/ws/agent-chat. The WebSocket protocol should support:
          1. Client sends: {type: "subscribe", agent_id: "..."} to watch an agent
          2. Client sends: {type: "message", agent_id: "...", content: "..."} to send to agent
          3. Server sends: {type: "agent_event", agent_id: "...", event: {...}} for agent activity
          4. Server sends: {type: "agent_message", agent_id: "...", content: "..."} for agent replies
          5. Heartbeat ping/pong every 30s.
          Wire the WebSocket handler into the IPC extension routes. Bridge to existing EventBus
          so WS clients receive the same events as SSE. Add auth token check on upgrade.
          Write integration test with tokio-tungstenite client. Verify cargo check + cargo test.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "WebSocket endpoint responds to upgrade, auth works, events stream, integration test passes"
        verify:
          - "cd daemon && cargo check --workspace"
          - "cd daemon && cargo test -p convergio-ipc -- ws"
          - "cd daemon && grep -q 'ws/agent-chat' crates/convergio-ipc/src/routes.rs || grep -rq 'ws/agent-chat' crates/convergio-ipc/src/"
          - "cd daemon && cargo fmt --all -- --check"

  # ═══════════════════════════════════════════════════════════
  # W2 — Mission Control + Core Shell (Flagship #1)
  # Covers: F-02, F-25, F-29
  # ═══════════════════════════════════════════════════════════
  - id: W2
    name: "Mission Control & Core Shell"
    tasks:
      - id: T2-01
        do: >
          Build the Mission Control home page (/) — the flagship command center.
          This is NOT a generic dashboard. It answers 3 questions in 5 seconds:
          1. Are my organizations healthy? 2. Which mission needs me? 3. Can I safely do nothing?

          Layout (use Maranello DS components):
          - Top strip: MnSystemStatus (daemon health + mesh nodes) + MnBudgetTracker (total spend)
          - AI summary line: "2 orgs on track, 1 blocked, $412 remaining, no human action needed"
          - Left: MnSentinel (overall health gauge) + MnSpeedometer (throughput)
          - Center: Active plans list with MnWaveProgress for top 3 plans
          - Right: MnActivityFeed (live SSE events from /api/observatory/timeline)
          - Bottom: Quick action buttons (Spawn Agent, Create Plan, Run Doctor)

          Data sources: /api/health, /api/cost/summary, /api/plan-db/list, /api/agents/runtime,
          /api/observatory/timeline, /api/mesh, /api/orgs.
          Use useApiQuery with pollInterval for health data. Use useEventSource for timeline.
          All strings localized via useLocale(). All components themed for 4 themes.
          Responsive: on mobile, stack vertically with summary-first layout.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "Mission Control renders, shows real daemon data, SSE timeline works, mobile responsive"
        verify:
          - "cd convergio-app && test -f 'src/app/(dashboard)/page.tsx'"
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && pnpm typecheck"

      - id: T2-02
        do: >
          Build the AI Chat panel with streaming. Implement /api/chat Next.js route that proxies
          to the daemon's /api/kernel/ask endpoint. Use Vercel AI SDK v6 for streaming responses.
          Configure 2 AI agents in convergio.yaml:
          1. Jervis — platform orchestrator (proxies to /api/kernel/ask)
          2. NaSra — design system expert (proxies to /api/orgs/:id/ask with org=convergio-frontend)
          The chat panel should be a global sidebar (toggleable via header icon or Cmd+J).
          Support: streaming text, markdown rendering, code blocks, agent switching.
          All strings localized. Works in all 4 themes.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "AI chat panel opens, streams responses from daemon, agent switching works, markdown renders"
        verify:
          - "cd convergio-app && test -f src/app/api/chat/route.ts"
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && pnpm typecheck"

      - id: T2-03
        do: >
          Enhance the Command Palette (Cmd-K) for global Convergio search.
          The palette must search across ALL Convergio objects:
          - Agents (from /api/agents/catalog)
          - Plans (from /api/plan-db/list)
          - Organizations (from /api/orgs)
          - Tasks (from plan execution trees)
          - Reports (from /api/reports)
          - Anomalies (from /api/observatory/anomalies)
          Add quick actions: "Spawn Agent", "Create Plan", "Run Doctor", "Switch Theme",
          "Switch Language", "Open Settings".
          Use MnCommandMenu from Maranello DS. Fuzzy search with cmdk.
          All labels localized.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "Cmd-K opens, searches agents/plans/orgs, quick actions work, localized"
        verify:
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && pnpm typecheck"

  # ═══════════════════════════════════════════════════════════
  # W3 — Agent Workspace (Flagship #2)
  # Covers: F-03, F-05
  # ═══════════════════════════════════════════════════════════
  - id: W3
    name: "Agent Workspace — Live Agent Interaction"
    tasks:
      - id: T3-01
        do: >
          Build the Agent Workspace page (/agents/workspace) — the 4-pane flagship experience.

          LEFT RAIL — Agent Roster:
          - MnAgentSidebar with agents from /api/agents/runtime
          - Filter by: status (active/idle/blocked), org, plan, capability
          - Each agent shows: MnAgentCard with role, org, current task, budget burn, status badge

          CENTER — Live Conversation + Execution Timeline:
          - MnAgentChat connected via WebSocket (/api/ws/agent-chat)
          - Shows agent events: tool calls, decisions, approvals, errors
          - Human can send messages to agent, approve/reject, interrupt
          - Fallback to SSE (/api/events/stream) if WebSocket unavailable

          RIGHT INSPECTOR — Context Panel:
          - Current task details (from plan execution tree)
          - Plan/wave position with MnWaveProgress
          - Evidence gate status with MnGateStatus
          - Budget burn rate
          - Assigned model/tier and mesh node
          - Linked PR/commit/files

          BOTTOM DRAWER — Runtime:
          - Agent logs (from /api/agents/:id/context)
          - IPC messages (from /api/ipc/messages)
          - Artifacts
          - Checkpoints

          All strings localized. All themes. Responsive: on mobile, tabs instead of panes.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "4-pane layout renders, WebSocket connects, agent roster shows data, chat works"
        verify:
          - "cd convergio-app && test -f 'src/app/(dashboard)/agents/workspace/page.tsx'"
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && pnpm typecheck"

      - id: T3-02
        do: >
          Build the Agents catalog page (/agents) with full CRUD.
          - LIST: MnDataTable with agents from /api/agents/catalog. Columns: name, category,
            status, model, description. Filter by category, status. Search by name.
          - CREATE: Modal form to create new agent spec (POST /api/agents/catalog).
            Fields: name, description, category, instructions, model, tier, budget.
          - EDIT: Click agent row → detail view with editable fields (PUT /api/agents/catalog/:name).
          - DELETE: Confirm dialog → DELETE /api/agents/catalog/:name.
          - SPAWN: "Spawn Agent" button opens form → POST /api/agents/spawn.
            Fields: agent_name, org_id, instructions, tier, budget_usd, timeout_secs.
            Dry-run toggle (dry_run: true for validation).
          - RUNTIME: Tab showing active agents from /api/agents/runtime with kill button.
          - KILL ALL: Emergency button → POST /api/agents/kill-all (confirm dialog).
          All strings localized. Use MnBadge for status. MnAgentCard for list items optionally.
        type: code
        output_type: pr
        model: claude-opus-4-6
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "Agent list renders, CRUD works, spawn form submits, runtime tab shows active agents"
        verify:
          - "cd convergio-app && test -f 'src/app/(dashboard)/agents/page.tsx'"
          - "cd convergio-app && pnpm build"
          - "cd convergio-app && pnpm typecheck"

