# Stress Test (ADR-039)
# ═══════════════════════════════════════════════════════════
stress_test:
  most_likely_to_fail: >
    T11-01 (Tauri system tray) — Tauri's system tray API on macOS has quirks
    with dynamic icon swapping and native menu construction. Rust ↔ React bridge
    for health polling adds complexity.
  single_point_of_failure: >
    T0-01 (Foundation setup) — if the convergio-frontend template doesn't clone
    cleanly into convergio-app/ or has incompatibilities with the monorepo structure,
    everything downstream is blocked.
  removable_task: >
    T9-04 (Scheduler) — simplest page, lowest user impact. Policy config is rarely
    changed and can be done via CLI.
  cascade_risk: >
    W1 (WebSocket) → W3 (Agent Workspace). If WebSocket layer has issues, the
    flagship Agent Workspace chat degrades to SSE-only. Mitigation: T3-01 has
    SSE fallback built in.
  integration_gap: >
    The Command Palette (T2-03) needs to query objects from pages that don't exist
    yet when it's built in W2. Initial implementation should gracefully handle
    empty/unavailable data sources and be updated in later waves.
